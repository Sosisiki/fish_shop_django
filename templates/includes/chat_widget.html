<!-- templates/includes/chat_widget.html -->

<!-- Кнопка открытия чата -->
<div id="chatWidgetContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
    
    <!-- Кнопка -->
    <button id="chatToggleBtn" onclick="toggleChat()" style="
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0077b6, #00b4d8);
        border: none;
        color: white;
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 119, 182, 0.4);
        transition: transform 0.3s;
    " onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        💬
    </button>
    
    <!-- Окно чата -->
    <div id="chatWindow" style="
        display: none;
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 350px;
        height: 450px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
        flex-direction: column;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
    ">
        
        <!-- Заголовок -->
        <div style="
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        ">
            <div style="display: flex; align-items: center;">
                <span style="font-size: 20px; margin-right: 10px;">🐠</span>
                <div>
                    <div style="font-weight: bold; font-size: 14px;">Консультант</div>
                    <div style="font-size: 11px; opacity: 0.9;">Онлайн</div>
                </div>
            </div>
            <button onclick="toggleChat()" style="
                background: none;
                border: none;
                color: white;
                font-size: 20px;
                cursor: pointer;
                padding: 0;
                width: 30px;
                height: 30px;
            ">✕</button>
        </div>
        
        <!-- Сообщения -->
        <div id="chatMessages" style="
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
        ">
            <div style="margin-bottom: 15px;">
                <div style="
                    background: white;
                    color: #333;
                    padding: 10px 15px;
                    border-radius: 15px;
                    border-bottom-left-radius: 5px;
                    display: inline-block;
                    max-width: 80%;
                    font-size: 13px;
                    line-height: 1.4;
                    border: 1px solid #dee2e6;
                ">
                    Здравствуйте! 🐠 Я консультант магазина рыбок. 
                    Помогу подобрать рыбок для вашего аквариума! Какой у вас объём?
                </div>
                <div style="font-size: 10px; color: #999; margin-top: 5px;">Сейчас</div>
            </div>
        </div>
        
        <!-- Индикатор набора -->
        <div id="chatTyping" style="
            display: none;
            padding: 10px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
            text-align: center;
        ">
            <span style="display: inline-block; width: 6px; height: 6px; background: #0077b6; border-radius: 50%; margin: 0 2px; animation: typing 1.4s infinite;"></span>
            <span style="display: inline-block; width: 6px; height: 6px; background: #0077b6; border-radius: 50%; margin: 0 2px; animation: typing 1.4s infinite 0.2s;"></span>
            <span style="display: inline-block; width: 6px; height: 6px; background: #0077b6; border-radius: 50%; margin: 0 2px; animation: typing 1.4s infinite 0.4s;"></span>
            <div style="font-size: 11px; color: #666; margin-top: 5px;">Консультант печатает...</div>
        </div>
        
        <!-- Ввод -->
        <div style="
            display: flex;
            padding: 10px;
            border-top: 1px solid #dee2e6;
            background: white;
        ">
            <input 
                type="text" 
                id="chatInput" 
                placeholder="Введите сообщение..." 
                onkeypress="handleChatKeyPress(event)"
                style="
                    flex: 1;
                    border: 1px solid #dee2e6;
                    border-radius: 20px;
                    padding: 8px 15px;
                    margin-right: 10px;
                    font-size: 13px;
                    outline: none;
                "
            >
            <button onclick="sendChatMessage()" style="
                background: #0077b6;
                color: white;
                border: none;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                cursor: pointer;
                font-size: 16px;
            ">➤</button>
        </div>
    </div>
</div>

<style>
@keyframes typing {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-10px); }
}
</style>

<script>
// Инициализация сессии
let chatSessionId = localStorage.getItem('fish_chat_session') || null;

// Открыть/закрыть чат
function toggleChat() {
    const chatWindow = document.getElementById('chatWindow');
    const chatInput = document.getElementById('chatInput');
    
    if (chatWindow.style.display === 'none') {
        chatWindow.style.display = 'flex';
        setTimeout(() => chatInput.focus(), 100);
        scrollToBottom();
    } else {
        chatWindow.style.display = 'none';
    }
}

// Отправить сообщение
function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    
    if (!message) return;
    
    // Добавляем сообщение пользователя
    addMessage(message, 'user');
    input.value = '';
    
    // Показываем индикатор
    document.getElementById('chatTyping').style.display = 'block';
    scrollToBottom();
    
    // Отправляем в Django backend
    fetch('/orders/consultant/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({
            message: message,
            session_id: chatSessionId
        })
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('chatTyping').style.display = 'none';
        
        if (data.success) {
            addMessage(data.message, 'bot');
            chatSessionId = data.session_id;
            localStorage.setItem('fish_chat_session', chatSessionId);
        } else {
            addMessage('❌ ' + data.message, 'bot');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById('chatTyping').style.display = 'none';
        addMessage('⚠️ Ошибка соединения. Попробуйте позже.', 'bot');
    });
}

// Обработка Enter
function handleChatKeyPress(event) {
    if (event.key === 'Enter') {
        sendChatMessage();
    }
}

// Добавить сообщение
function addMessage(text, type) {
    const messagesContainer = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.style.marginBottom = '15px';
    
    const time = new Date().toLocaleTimeString('ru-RU', { 
        hour: '2-digit', 
        minute: '2-digit' 
    });
    
    if (type === 'user') {
        messageDiv.innerHTML = `
            <div style="
                background: #0077b6;
                color: white;
                padding: 10px 15px;
                border-radius: 15px;
                border-bottom-right-radius: 5px;
                display: inline-block;
                max-width: 80%;
                font-size: 13px;
                line-height: 1.4;
                float: right;
                clear: both;
            ">${text}</div>
            <div style="font-size: 10px; color: #999; margin-top: 5px; text-align: right; clear: both;">${time}</div>
            <div style="clear: both;"></div>
        `;
    } else {
        messageDiv.innerHTML = `
            <div style="
                background: white;
                color: #333;
                padding: 10px 15px;
                border-radius: 15px;
                border-bottom-left-radius: 5px;
                display: inline-block;
                max-width: 80%;
                font-size: 13px;
                line-height: 1.4;
                border: 1px solid #dee2e6;
            ">${text}</div>
            <div style="font-size: 10px; color: #999; margin-top: 5px;">${time}</div>
        `;
    }
    
    messagesContainer.appendChild(messageDiv);
    scrollToBottom();
}

// Прокрутка вниз
function scrollToBottom() {
    const messagesContainer = document.getElementById('chatMessages');
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Получить CSRF cookie
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
